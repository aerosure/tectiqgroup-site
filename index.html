<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECTIQ Group | At the Fault Line of Risk and Resilience</title>
    <meta name="description" content="TECTIQ Group - AI-native underwriting intelligence for construction risk.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="emblem.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate: #283940;
            --deep: #1A262B;
            --deep-rich: #131D21;
            --slate-light: #3D5A66;
            --copper: #B37C4D;
            --copper-glow: rgba(179, 124, 77, 0.12);
            --copper-dim: #96673F;
            --stone: #E8E6E1;
            --stone-dim: rgba(232, 230, 225, 0.7);
            --stone-muted: rgba(232, 230, 225, 0.35);
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--deep-rich);
            color: var(--stone);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === SUBTLE BACKGROUND TEXTURE === */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 40%, rgba(40, 57, 64, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 60%, rgba(61, 90, 102, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse 40% 30% at 50% 80%, rgba(179, 124, 77, 0.04) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        /* === GRAIN OVERLAY === */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* === MAIN CONTAINER === */
        .page {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 3rem 2rem;
        }

        /* === TOP LINE === */
        .accent-line {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent 10%, var(--copper) 30%, var(--copper) 70%, transparent 90%);
            z-index: 100;
        }

        /* === CONTENT STACK === */
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 640px;
            width: 100%;
        }

        /* === LOGO === */
        .logo-container {
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeIn 1.2s ease 0.3s forwards;
        }

        .logo-container img {
            height: 220px;
            width: auto;
        }

        /* === EMBLEM (used if logo file not available) === */
        .emblem-fallback {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 3rem;
        }

        .emblem-fallback img {
            height: 52px;
            width: auto;
        }

        .emblem-fallback .wordmark {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: 2.5rem;
            color: var(--stone);
            letter-spacing: 4px;
        }

        /* === TAGLINE === */
        .tagline {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: 1.15rem;
            font-weight: 400;
            color: var(--copper);
            letter-spacing: 0.5px;
            text-align: center;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeIn 1s ease 0.8s forwards;
        }

        /* === DIVIDER === */
        .divider {
            width: 60px;
            height: 1px;
            background: var(--slate-light);
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.9s forwards;
        }

        /* === DESCRIPTOR === */
        .descriptor {
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--stone-dim);
            text-align: center;
            line-height: 1.8;
            margin-bottom: 3.5rem;
            max-width: 480px;
            opacity: 0;
            animation: fadeIn 1s ease 1.2s forwards;
        }

        /* === CONTACT === */
        .contact-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            opacity: 0;
            animation: fadeIn 1s ease 1.5s forwards;
        }

        .contact-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--stone-muted);
        }

        .contact-link {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--copper);
            text-decoration: none;
            padding: 0.75rem 2rem;
            border: 1px solid rgba(179, 124, 77, 0.3);
            border-radius: 4px;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .contact-link:hover {
            background: var(--copper-glow);
            border-color: var(--copper);
            box-shadow: 0 0 30px rgba(179, 124, 77, 0.1);
        }

        /* === FOOTER === */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 0.8s ease 1.8s forwards;
        }

        .footer-left, .footer-right {
            font-family: 'DM Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--stone-muted);
        }

        .footer-right {
            color: rgba(232, 230, 225, 0.2);
        }

        /* === CORNER MARKS === */
        .corner-mark {
            position: fixed;
            width: 20px;
            height: 20px;
            opacity: 0;
            animation: fadeIn 0.6s ease 2.0s forwards;
        }

        .corner-mark::before,
        .corner-mark::after {
            content: '';
            position: absolute;
            background: rgba(61, 90, 102, 0.25);
        }

        .corner-tl { top: 24px; left: 24px; }
        .corner-tl::before { top: 0; left: 0; width: 20px; height: 1px; }
        .corner-tl::after { top: 0; left: 0; width: 1px; height: 20px; }

        .corner-tr { top: 24px; right: 24px; }
        .corner-tr::before { top: 0; right: 0; width: 20px; height: 1px; }
        .corner-tr::after { top: 0; right: 0; width: 1px; height: 20px; }

        .corner-bl { bottom: 24px; left: 24px; }
        .corner-bl::before { bottom: 0; left: 0; width: 20px; height: 1px; }
        .corner-bl::after { bottom: 0; left: 0; width: 1px; height: 20px; }

        .corner-br { bottom: 24px; right: 24px; }
        .corner-br::before { bottom: 0; right: 0; width: 20px; height: 1px; }
        .corner-br::after { bottom: 0; right: 0; width: 1px; height: 20px; }

        /* === ANIMATIONS === */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === RESPONSIVE === */
        @media (max-width: 640px) {
            .page { padding: 2rem 1.5rem; }
            .logo-container img { height: 170px; }
            .tagline { font-size: 1rem; }
            .descriptor { font-size: 0.9rem; }
            .footer { padding: 1rem 1.5rem; }
            .corner-mark { display: none; }
        }

        @media (max-width: 380px) {
            .logo-container img { height: 130px; }
            .tagline { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="accent-line"></div>

    <div class="corner-mark corner-tl"></div>
    <div class="corner-mark corner-tr"></div>
    <div class="corner-mark corner-bl"></div>
    <div class="corner-mark corner-br"></div>

    <div class="page">
        <div class="content">

            <!-- Logo: reference your logo file. Replace src with your hosted file path -->
            <div class="logo-container">
                <img src="tectiq_logo.png" alt="TECTIQ" onerror="this.parentElement.style.display='none';document.querySelector('.emblem-fallback').style.display='flex';">
            </div>

            <!-- Fallback if logo file missing -->
            <div class="emblem-fallback">
                <img src="emblem.png" alt="TECTIQ">
                <span class="wordmark">TECTIQ</span>
            </div>

            <div class="divider"></div>

            <div class="descriptor">
                AI-native underwriting intelligence<br>
                for construction and specialty risk.
            </div>

            <div class="contact-block">
                <span class="contact-label">Inquiries</span>
                <a href="mailto:info@tectiqgroup.com" class="contact-link">info@tectiqgroup.com</a>
            </div>

        </div>
    </div>

    <div class="footer">
        <span class="footer-left">Richmond, Virginia</span>
        <span class="footer-right">&copy; 2026 Tectiq Group, LLC</span>
    </div>

</body>
</html>
